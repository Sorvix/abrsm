<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ABRSM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            min-height: 100vh;
            /* 移除overflow: hidden，恢复滚动 */
        }
        /* 全屏自适应图片，置顶完整显示 */
        .fullscreen-img {
            display: block;
            width: 100vw;
            min-height: 100vh;
            z-index: 9999;
            position: relative;
            /* 完整显示图片，不裁切，解决左右黑边遮挡 */
            object-fit: contain;
            background: #000; /* 空白区域填充黑色，可选删掉变白色 */
        }
    </style>
</head>
<body>
    <img src="fuh.jpeg" alt="ABRSM" class="fullscreen-img">
</body>
</html>
